services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    user: "0:0"
    command: ["--noauth"]
    # ports: kısmını tamamen sildik, port çakışması yaşamayacağız.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fb.rule=Host(`kurtarma.socialwitch.com`)"
      - "traefik.http.services.fb.loadbalancer.server.port=80"
    volumes:
      - strapi-uploads:/srv/strapi-uploads
      - strapi-db:/srv/strapi-db
    restart: unless-stopped

volumes:
  strapi-uploads:
    external: true
    name: g8wk08ck0gs0cok4sc00k00c-black-strapi-uploads
  strapi-db:
    external: true
    name: g8wk08ck0gs0cok4sc00k00c-black-strapi-db
