services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser-extractor
    user: "0:0"
    command: ["--noauth"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fb.rule=Host(`kurtarma.socialwitch.com`)"
      - "traefik.http.services.fb.loadbalancer.server.port=80"
    volumes:
      # Sihirli dokunuş: Host'un tüm Docker volume dizinini direkt içeri alıyoruz
      - /var/lib/docker/volumes:/srv/docker-volumes:ro
    restart: unless-stopped
